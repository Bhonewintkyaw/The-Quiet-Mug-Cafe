<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation</title>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    .confirmation-box {
      max-width: 560px; /* was 480px */
      margin: 60px auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 8px 32px #a76e3e33;
      padding: 38px 28px 32px 28px;
      text-align: center;
      position: relative;
      border: 2px solid #f5e6d6;
      animation: popIn 0.7s cubic-bezier(.17,.67,.83,.67);
    }
    @keyframes popIn {
      0% { transform: scale(.85); opacity: 0; }
      80% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); }
    }
    h2 {
      color: #a76e3e;
      margin-bottom: 18px;
      font-size: 1.45em;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .order-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 18px;
      background: #f9f6f2;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px #a76e3e11;
      font-size: 1.07em;
    }
    .order-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #e9e4d4;
      color: #5a3a2e;
      vertical-align: middle;
      transition: background 0.2s;
    }
    .order-table td:first-child {
      font-weight: 600;
      width: 140px;
      background: #f5e6d6;
      color: #a76e3e;
      border-right: 1px solid #e9e4d4;
      text-align: right;
      letter-spacing: .5px;
    }
    .order-table tr:last-child td {
      border-bottom: none;
    }
    .payment-instruction {
      margin-top: 18px;
      color: #5a3a2e;
      background: #fff8f1;
      border-radius: 10px;
      padding: 18px 12px;
      font-size: 1.08em;
      box-shadow: 0 2px 8px #a76e3e11;
      line-height: 1.7;
    }
    .amount-highlight {
      color: #b07d62;
      font-weight: bold;
      font-size: 1.15em;
      background: #f5e6d6;
      border-radius: 6px;
      padding: 2px 8px;
      margin: 0 2px;
      display: inline-block;
    }
    .back-btn {
      position: fixed;
      top: 12px;
      left: 16px;
      background: linear-gradient(135deg, #d4a373, #b07d62);
      color: #fff;
      padding: 8px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.98em;
      font-weight: bold;
      box-shadow: 0 2px 8px #a76e3e22;
      z-index: 2000;
      letter-spacing: .5px;
      border: none;
      outline: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: linear-gradient(135deg, #b07d62, #a76e3e);
      transform: scale(1.04);
    }
  </style>
</head>
<body>
  <a href="Menu.html" class="back-btn">← Back to Menu</a>
  <div class="confirmation-box">
    <h2>Order Confirmed & Payment Instructions</h2>

    <table class="order-table">
      <tr><td>Name</td><td id="name"></td></tr>
      <tr><td>Phone</td><td id="phone"></td></tr>
      <tr><td>Delivery Address</td><td id="address"></td></tr>
      <tr><td>Note</td><td id="note"></td></tr>
      <tr><td>Payment Method</td><td id="payment"></td></tr>

      <!-- Order transcript row -->
      <tr>
        <td>Your Order</td>
        <td>
          <!-- Header row for order list -->
          <div style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; font-weight:700; color:#a76e3e; background:#f5e6d6; border-radius:8px; padding:8px 12px; margin-bottom:4px; font-size:1em;">
            <span style="flex:2; text-align:left;">Products</span>
            <span style="flex:1; text-align:center;">Qty</span>
            <span style="flex:1; text-align:right;">Price</span>
            <span style="flex:1; text-align:right;">Total</span>
          </div>
          <ul id="orderList" style="list-style:none; padding:0; margin:0;">
            <!-- JS will fill items here -->
          </ul>
        </td>
      </tr>

      <tr><td>Amount</td><td><span class="amount-highlight" id="total"></span></td></tr>
    </table>
    <div class="payment-instruction">
      Please open your <span id="payMethod"></span> app and transfer
      <span class="amount-highlight" id="total2"></span>
      to our official account.<br>
      After payment, your order will be processed.<br><br>
      <span style="font-size:0.98em; color:#a76e3e; font-weight: bold;">Thank you for ordering at The Quiet Mug!</span>
    </div>
  </div>
  <script>
  document.getElementById('name').textContent = localStorage.getItem('order_name') || '';
  document.getElementById('phone').textContent = localStorage.getItem('order_phone') || '';
  document.getElementById('address').textContent = localStorage.getItem('order_address') || '';
  document.getElementById('note').textContent = localStorage.getItem('order_note') || '-';
  document.getElementById('payment').textContent = localStorage.getItem('order_payment') === 'kbzpay' ? 'KBZPay' : 'WavePay';
  document.getElementById('payMethod').textContent = localStorage.getItem('order_payment') === 'kbzpay' ? 'KBZPay' : 'WavePay';

  // Show order transcript in table and calculate total
  const orderList = document.getElementById('orderList');
  let cart = JSON.parse(localStorage.getItem('order_cart')) || {};
  orderList.innerHTML = '';
  let totalAmount = 0;
  Object.keys(cart).forEach(item => {
    const qty = cart[item].quantity || 1;
    const price = cart[item].price || 0;
    const itemTotal = qty * price;
    totalAmount += itemTotal;
    orderList.innerHTML += `
      <li style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #e9e4d4;">
        <span style="flex:2; color:#5a3a2e; text-align:left;">${item}</span>
        <span style="flex:1; text-align:center; color:#a76e3e;">${qty}</span>
        <span style="flex:1; text-align:right; color:#b07d62;">${price === 0 ? "Free" : price}</span>
        <span style="flex:1; text-align:right; color:#b07d62; font-weight:600;">${itemTotal === 0 ? "Free" : itemTotal}</span>
      </li>
    `;
  });

  document.getElementById('total').textContent = 'MMK' + totalAmount;
  document.getElementById('total2').textContent = 'MMK' + totalAmount;
  </script>
</body>
</html>
