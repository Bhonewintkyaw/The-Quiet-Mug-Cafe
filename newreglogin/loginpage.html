<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cafe Site - Login</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(139, 69, 19, 0.9);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0px 3px 6px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: rgba(111, 52, 16, 0.9);
    }

    .login-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 30px 40px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
    }
    .login-box input {
      width: 92%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }
    .login-box input:focus {
      border: 2px solid #8B4513;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #8B4513;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s;
    }
    .login-box button:hover {
      background: #6f3410;
    }
    .login-box p {
      margin-top: 15px;
      font-size: 14px;
      color: #fff;
    }
    .login-box a {
      color: #ffdd99;
      text-decoration: none;
      font-weight: bold;
    }
    .login-box a:hover {
      text-decoration: underline;
    }

    .success, .error {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      margin-top: 20px;
      line-height: 40px;
      color: white;
      font-weight: bold;
    }
    .success { background-color: rgba(0, 128, 0, 0.8); }
    .error { background-color: rgba(255, 0, 0, 0.8); }
  </style>
</head>
<body>
  <a href="/index.html" class="back-btn">← Back to Homepage</a>

  <div class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="identifier" placeholder="Username or Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="loginbtn">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
    <div class="message_box"></div>
  </div>

  <script>
  // Initialize users array in localStorage if it doesn't exist
  if (!localStorage.getItem('users')) {
    localStorage.setItem('users', JSON.stringify([]));
  }

  const form = document.getElementById("loginForm");
  const message = document.querySelector(".message_box");

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    
    const identifier = document.getElementById("identifier").value.trim();
    const password = document.getElementById("password").value;

    if (!identifier || !password) {
      showMessage("Please fill in all fields!", "error");
      return;
    }

    // Get users from localStorage
    const users = JSON.parse(localStorage.getItem('users'));
    
    // Find user by username or email
    const user = users.find(u => 
      (u.username === identifier || u.email === identifier) && 
      u.password === password
    );

    if (user) {
      // Save current user in sessionStorage
      sessionStorage.setItem('currentUser', JSON.stringify(user));

      // ✅ Mark user as logged in (so homepage button changes)
      localStorage.setItem("loggedIn", "true");

      showMessage("Login successful!", "success");
      
      // Redirect to homepage after short delay
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    } else {
      showMessage("Invalid username/email or password!", "error");
    }
  });

  function showMessage(text, type) {
    message.textContent = text;
    message.className = type;
  }
</script>

</body>
</html>
